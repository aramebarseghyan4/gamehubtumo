<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>City Car Drive</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
    h1 { color: #e94560; margin-bottom: 10px; font-size: 28px; letter-spacing: 2px; }
    #gameCanvas { border: 3px solid #e94560; border-radius: 8px; }
    #hud { color: #fff; margin-top: 10px; font-size: 16px; display: flex; gap: 30px; }
    #hud span { color: #e94560; font-weight: bold; }
    #controls { color: #aaa; margin-top: 8px; font-size: 13px; }
    #gameOver { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.85); border: 2px solid #e94560; border-radius: 12px;
      padding: 30px 50px; text-align: center; color: #fff; }
    #gameOver h2 { color: #e94560; font-size: 32px; margin-bottom: 10px; }
    #gameOver button { margin-top: 15px; padding: 10px 30px; background: #e94560; color: #fff;
      border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    #gameOver button:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>🚗 City Car Drive</h1>
  <canvas id="gameCanvas" width="500" height="600"></canvas>
  <div id="hud">Score: <span id="score">0</span> &nbsp;&nbsp; Speed: <span id="speed">0</span> km/h &nbsp;&nbsp; Lives: <span id="lives">3</span></div>
  <div id="controls">⬅ ➡ Arrow Keys to steer &nbsp;|&nbsp; ⬆ Accelerate &nbsp;|&nbsp; ⬇ Brake</div>
  <div id="gameOver">
    <h2>GAME OVER</h2>
    <p id="finalScore">Score: 0</p>
    <button onclick="restartGame()">Play Again</button>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const ROAD_LEFT = 80;
    const ROAD_RIGHT = 420;
    const ROAD_WIDTH = ROAD_RIGHT - ROAD_LEFT;
    const LANE_COUNT = 3;
    const LANE_W = ROAD_WIDTH / LANE_COUNT;

    let score = 0;
    let lives = 3;
    let gameSpeed = 4;
    let crashed = false;
    let flashTimer = 0;

    const player = {
      x: 240, y: 500,
      w: 36, h: 60,
      speed: 0,
      maxSpeed: 8,
      velX: 0,
      color: '#00d4ff'
    };

    const keys = {};
    document.addEventListener('keydown', e => keys[e.key] = true);
    document.addEventListener('keyup', e => keys[e.key] = false);

    // Road stripes
    let stripes = [];
    for (let i = 0; i < 10; i++) {
      stripes.push({ y: i * 80 });
    }

    // Other cars
    let cars = [];
    let carTimer = 0;

    const carColors = ['#ff6b6b', '#ffd93d', '#6bcb77', '#ff922b', '#cc5de8', '#fff'];

    function spawnCar() {
      const lane = Math.floor(Math.random() * LANE_COUNT);
      const x = ROAD_LEFT + lane * LANE_W + LANE_W / 2 - 18;
      cars.push({ x, y: -80, w: 36, h: 60, color: carColors[Math.floor(Math.random() * carColors.length)], speed: 2 + Math.random() * 2 });
    }

    function drawRoad() {
      // Sky/ground
      ctx.fillStyle = '#2d2d2d';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grass
      ctx.fillStyle = '#2d5016';
      ctx.fillRect(0, 0, ROAD_LEFT, canvas.height);
      ctx.fillRect(ROAD_RIGHT, 0, canvas.width - ROAD_RIGHT, canvas.height);

      // Road
      ctx.fillStyle = '#555';
      ctx.fillRect(ROAD_LEFT, 0, ROAD_WIDTH, canvas.height);

      // Road edge lines
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 4;
      ctx.beginPath(); ctx.moveTo(ROAD_LEFT, 0); ctx.lineTo(ROAD_LEFT, canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(ROAD_RIGHT, 0); ctx.lineTo(ROAD_RIGHT, canvas.height); ctx.stroke();

      // Lane dashes
      ctx.strokeStyle = '#ffff00';
      ctx.lineWidth = 2;
      ctx.setLineDash([30, 20]);
      for (let l = 1; l < LANE_COUNT; l++) {
        const lx = ROAD_LEFT + l * LANE_W;
        stripes.forEach(s => {
          ctx.beginPath(); ctx.moveTo(lx, s.y); ctx.lineTo(lx, s.y + 40); ctx.stroke();
        });
      }
      ctx.setLineDash([]);
    }

    function drawCar(car, isPlayer) {
      const x = car.x, y = car.y, w = car.w, h = car.h;

      // Body
      ctx.fillStyle = car.color;
      ctx.beginPath();
      ctx.roundRect(x, y + 10, w, h - 20, 8);
      ctx.fill();

      // Roof
      ctx.fillStyle = isPlayer ? '#0099bb' : darken(car.color);
      ctx.beginPath();
      ctx.roundRect(x + 5, y + 18, w - 10, h - 36, 6);
      ctx.fill();

      // Windows
      ctx.fillStyle = isPlayer ? '#b3f0ff' : '#cce6ff';
      ctx.fillRect(x + 7, y + 20, w - 14, 12);

      // Wheels
      ctx.fillStyle = '#111';
      ctx.fillRect(x - 4, y + 14, 8, 14);
      ctx.fillRect(x + w - 4, y + 14, 8, 14);
      ctx.fillRect(x - 4, y + h - 28, 8, 14);
      ctx.fillRect(x + w - 4, y + h - 28, 8, 14);

      // Headlights
      if (isPlayer) {
        ctx.fillStyle = '#ffffaa';
        ctx.fillRect(x + 4, y + 10, 8, 5);
        ctx.fillRect(x + w - 12, y + 10, 8, 5);
      } else {
        ctx.fillStyle = '#ff4444';
        ctx.fillRect(x + 4, y + h - 15, 8, 5);
        ctx.fillRect(x + w - 12, y + h - 15, 8, 5);
      }
    }

    function darken(hex) {
      return '#555';
    }

    function checkCollision(a, b) {
      return a.x < b.x + b.w && a.x + a.w > b.x &&
             a.y < b.y + b.h && a.y + a.h > b.y;
    }

    function restartGame() {
      score = 0; lives = 3; gameSpeed = 4; crashed = false;
      player.x = 240; player.y = 500; player.speed = 0; player.velX = 0;
      cars = []; carTimer = 0; flashTimer = 0;
      document.getElementById('gameOver').style.display = 'none';
      requestAnimationFrame(gameLoop);
    }

    let lastTime = 0;
    function gameLoop(ts) {
      const dt = Math.min((ts - lastTime) / 16, 3);
      lastTime = ts;

      if (crashed) {
        flashTimer--;
        if (flashTimer <= 0) {
          if (lives <= 0) {
            document.getElementById('finalScore').textContent = 'Score: ' + score;
            document.getElementById('gameOver').style.display = 'block';
            return;
          }
          crashed = false;
          player.x = 240; player.y = 500; player.speed = 0;
        }
      }

      if (!crashed) {
        // Input
        if (keys['ArrowUp']) player.speed = Math.min(player.speed + 0.2, player.maxSpeed);
        else if (keys['ArrowDown']) player.speed = Math.max(player.speed - 0.3, 0);
        else player.speed = Math.max(player.speed - 0.05, 0);

        if (keys['ArrowLeft']) player.velX = Math.max(player.velX - 0.5, -6);
        else if (keys['ArrowRight']) player.velX = Math.min(player.velX + 0.5, 6);
        else player.velX *= 0.8;

        player.x += player.velX * dt;
        player.x = Math.max(ROAD_LEFT + 2, Math.min(ROAD_RIGHT - player.w - 2, player.x));

        // Scroll
        const scrollY = (gameSpeed + player.speed) * dt;
        stripes.forEach(s => { s.y += scrollY; if (s.y > canvas.height) s.y -= 800; });

        // Spawn cars
        carTimer -= dt;
        if (carTimer <= 0) { spawnCar(); carTimer = 40 + Math.random() * 40; }

        cars.forEach(c => { c.y += (scrollY - c.speed * dt); });
        cars = cars.filter(c => c.y < canvas.height + 100);

        // Collision
        for (const c of cars) {
          if (checkCollision(player, c)) {
            crashed = true; lives--; flashTimer = 90;
            document.getElementById('lives').textContent = lives;
            break;
          }
        }

        score += Math.floor(player.speed * 0.1 + 0.2);
        gameSpeed = 4 + score / 800;

        document.getElementById('score').textContent = score;
        document.getElementById('speed').textContent = Math.floor(player.speed * 15 + gameSpeed * 8);
      }

      // Draw
      drawRoad();
      cars.forEach(c => drawCar(c, false));

      if (!crashed || Math.floor(flashTimer / 10) % 2 === 0) {
        drawCar(player, true);
      }

      // Score display on canvas
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(85, 8, 150, 28);
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 16px Arial';
      ctx.fillText('Score: ' + score, 95, 27);

      requestAnimationFrame(gameLoop);
    }

    requestAnimationFrame(gameLoop);
  </script>
</body>
</html>
