<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Brick Blaster</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{background:radial-gradient(ellipse at 50% 20%,#3a1004 0%,#140805 70%);
    color:#ffe0d0;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    padding:16px;overflow:hidden;-webkit-tap-highlight-color:transparent;}
  .back{position:fixed;top:16px;left:16px;z-index:50;text-decoration:none;
    font-family:'Orbitron',sans-serif;font-size:.74rem;font-weight:700;letter-spacing:.08em;
    color:#ff9050;background:rgba(50,18,8,.8);border:1px solid rgba(255,130,40,.4);
    padding:9px 16px;border-radius:10px;backdrop-filter:blur(8px);transition:.18s;}
  .back:hover{background:rgba(220,90,20,.3);box-shadow:0 0 16px rgba(255,120,0,.4);transform:translateY(-1px);}
  .title{font-family:'Orbitron',sans-serif;font-size:clamp(1.6rem,5vw,2.6rem);font-weight:900;
    letter-spacing:.08em;color:#ff8030;text-shadow:0 0 14px #ff6020,0 0 40px rgba(255,90,0,.55);}
  .hud{display:flex;gap:12px;}
  .stat{background:linear-gradient(160deg,rgba(55,20,8,.9),rgba(28,12,6,.95));
    border:1px solid rgba(255,130,40,.3);border-radius:11px;padding:7px 18px;text-align:center;min-width:78px;}
  .stat .lbl{font-size:.58rem;letter-spacing:.16em;color:#b06840;text-transform:uppercase;}
  .stat .val{font-family:'Orbitron',sans-serif;font-size:1.2rem;font-weight:900;color:#ffc080;}
  #wrap{position:relative;}
  canvas{background:linear-gradient(180deg,#1a0c08,#0e0604);border:1.5px solid rgba(255,130,40,.35);
    border-radius:14px;box-shadow:0 0 50px rgba(255,90,0,.2),0 18px 50px rgba(0,0,0,.6);display:block;
    touch-action:none;}
  .hint{font-size:.76rem;color:#a06850;letter-spacing:.04em;}
  .btn{font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.06em;cursor:pointer;border:none;
    border-radius:11px;padding:11px 30px;font-size:.82rem;color:#1a0800;
    background:linear-gradient(135deg,#ff9040,#cc4400);box-shadow:0 0 18px rgba(255,120,0,.35);transition:.15s;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(255,120,0,.6);}
  #overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;background:rgba(14,6,4,.85);border-radius:14px;backdrop-filter:blur(4px);z-index:5;}
  #overlay.hide{display:none;}
  #ovmsg{font-family:'Orbitron',sans-serif;font-size:1.6rem;font-weight:900;color:#ffc060;
    text-shadow:0 0 24px rgba(255,160,0,.6);text-align:center;}
</style>
</head>
<body>
  <a href="index.html" class="back">← HUB</a>
  <div class="title">⚡ BRICK BLASTER</div>
  <div class="hud">
    <div class="stat"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
    <div class="stat"><div class="lbl">Lives</div><div class="val" id="lives">3</div></div>
    <div class="stat"><div class="lbl">Level</div><div class="val" id="level">1</div></div>
  </div>
  <div id="wrap">
    <canvas id="cv" width="480" height="520"></canvas>
    <div id="overlay"><div id="ovmsg">⚡ BRICK BLASTER</div><button class="btn" id="startbtn">▶ START</button></div>
  </div>
  <div class="hint">← → / A D / mouse / drag · bounce the ball, clear the bricks</div>

<script>
'use strict';
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const W=cv.width,H=cv.height;
const COLORS=['#ff4466','#ff8030','#ffd040','#44dd88','#40b0ff','#a060ff'];
let paddle,ball,bricks,score,lives,level,running,raf;

function makeBricks(){
  bricks=[];
  const rows=4+Math.min(level,4),cols=8;
  const bw=(W-40)/cols,bh=20,top=50,gap=4;
  for(let r=0;r<rows;r++)for(let c=0;c<cols;c++){
    bricks.push({x:20+c*bw,y:top+r*(bh+gap),w:bw-gap,h:bh,color:COLORS[r%COLORS.length],alive:true});
  }
}
function reset(full){
  if(full){score=0;lives=3;level=1;}
  paddle={x:W/2-45,y:H-30,w:90,h:12,speed:7};
  resetBall();
  makeBricks();
  updateHUD();
}
function resetBall(){
  const ang=(-60+Math.random()*-60)*Math.PI/180; // upward
  const sp=4.6+level*0.4;
  ball={x:W/2,y:H-46,r:8,vx:Math.cos(ang)*sp*(Math.random()<.5?1:-1),vy:Math.sin(ang)*sp,stuck:true};
}
function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('lives').textContent=lives;
  document.getElementById('level').textContent=level;
}
const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;if([' ','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
  if(e.key===' '&&ball&&ball.stuck)ball.stuck=false;});
document.addEventListener('keyup',e=>keys[e.key]=false);
function movePaddleTo(clientX){
  const rect=cv.getBoundingClientRect();
  const x=(clientX-rect.left)*(W/rect.width);
  paddle.x=Math.max(0,Math.min(W-paddle.w,x-paddle.w/2));
}
cv.addEventListener('mousemove',e=>{if(paddle)movePaddleTo(e.clientX);});
cv.addEventListener('touchmove',e=>{if(paddle&&e.touches[0]){movePaddleTo(e.touches[0].clientX);if(ball)ball.stuck=false;}e.preventDefault();},{passive:false});
cv.addEventListener('click',()=>{if(ball&&ball.stuck)ball.stuck=false;});

function loop(){
  raf=requestAnimationFrame(loop);
  // paddle keys
  if(keys['ArrowLeft']||keys['a']||keys['A'])paddle.x-=paddle.speed;
  if(keys['ArrowRight']||keys['d']||keys['D'])paddle.x+=paddle.speed;
  paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));

  if(ball.stuck){ball.x=paddle.x+paddle.w/2;ball.y=paddle.y-ball.r-1;}
  else{
    ball.x+=ball.vx;ball.y+=ball.vy;
    if(ball.x-ball.r<0){ball.x=ball.r;ball.vx*=-1;}
    if(ball.x+ball.r>W){ball.x=W-ball.r;ball.vx*=-1;}
    if(ball.y-ball.r<0){ball.y=ball.r;ball.vy*=-1;}
    // paddle collision
    if(ball.vy>0&&ball.y+ball.r>=paddle.y&&ball.y+ball.r<=paddle.y+paddle.h+ball.vy&&
       ball.x>=paddle.x-ball.r&&ball.x<=paddle.x+paddle.w+ball.r){
      const hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2); // -1..1
      const sp=Math.hypot(ball.vx,ball.vy);
      const ang=hit*Math.PI/3; // max 60deg
      ball.vx=sp*Math.sin(ang);ball.vy=-Math.abs(sp*Math.cos(ang));
      ball.y=paddle.y-ball.r-1;
    }
    // bottom -> lose life
    if(ball.y-ball.r>H){
      lives--;updateHUD();
      if(lives<=0){gameOver(false);return;}
      resetBall();
    }
    // bricks
    for(const b of bricks){
      if(!b.alive)continue;
      if(ball.x+ball.r>b.x&&ball.x-ball.r<b.x+b.w&&ball.y+ball.r>b.y&&ball.y-ball.r<b.y+b.h){
        b.alive=false;score+=10;updateHUD();
        // bounce: pick axis by overlap
        const ox=Math.min(ball.x+ball.r-b.x,b.x+b.w-(ball.x-ball.r));
        const oy=Math.min(ball.y+ball.r-b.y,b.y+b.h-(ball.y-ball.r));
        if(ox<oy)ball.vx*=-1;else ball.vy*=-1;
        break;
      }
    }
    if(bricks.every(b=>!b.alive)){level++;updateHUD();resetBall();makeBricks();}
  }
  draw();
}
function draw(){
  ctx.clearRect(0,0,W,H);
  // bricks
  for(const b of bricks){
    if(!b.alive)continue;
    ctx.fillStyle=b.color;ctx.shadowColor=b.color;ctx.shadowBlur=8;
    roundRect(b.x,b.y,b.w,b.h,4);ctx.fill();
  }
  ctx.shadowBlur=0;
  // paddle
  ctx.fillStyle='#ffb060';ctx.shadowColor='#ff8030';ctx.shadowBlur=14;
  roundRect(paddle.x,paddle.y,paddle.w,paddle.h,6);ctx.fill();
  // ball
  ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fillStyle='#fff';
  ctx.shadowColor='#ffd0a0';ctx.shadowBlur=16;ctx.fill();ctx.shadowBlur=0;
}
function roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
function start(){
  reset(true);running=true;
  document.getElementById('overlay').classList.add('hide');
  cancelAnimationFrame(raf);loop();
}
function gameOver(win){
  running=false;cancelAnimationFrame(raf);
  document.getElementById('ovmsg').innerHTML=win?'🏆 YOU WIN!':('GAME OVER<br><span style="font-size:1rem;color:#ffa060">Score: '+score+'</span>');
  document.getElementById('startbtn').textContent='▶ PLAY AGAIN';
  document.getElementById('overlay').classList.remove('hide');
}
document.getElementById('startbtn').addEventListener('click',start);
reset(true);draw();
</script>
</body>
</html>
