<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:radial-gradient(ellipse at 50% 25%,#2a0f3d 0%,#0d0814 70%);
    color:#e8d8ff;font-family:'Segoe UI',system-ui,sans-serif;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:18px;padding:20px;overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .back{position:fixed;top:16px;left:16px;z-index:50;text-decoration:none;
    font-family:'Orbitron',sans-serif;font-size:.74rem;font-weight:700;letter-spacing:.08em;
    color:#c080ff;background:rgba(30,12,55,.8);border:1px solid rgba(180,90,255,.4);
    padding:9px 16px;border-radius:10px;backdrop-filter:blur(8px);transition:.18s;}
  .back:hover{background:rgba(120,50,220,.3);box-shadow:0 0 16px rgba(157,0,255,.4);transform:translateY(-1px);}
  .head{display:flex;align-items:center;gap:22px;}
  .title{font-family:'Orbitron',sans-serif;font-size:clamp(2.2rem,7vw,3.4rem);font-weight:900;
    letter-spacing:.06em;color:#ff66cc;
    text-shadow:0 0 14px #ff44bb,0 0 40px rgba(255,60,180,.6);}
  .scores{display:flex;gap:12px;}
  .score-box{background:linear-gradient(160deg,rgba(40,18,70,.9),rgba(22,10,40,.95));
    border:1px solid rgba(180,90,255,.3);border-radius:12px;padding:8px 18px;text-align:center;min-width:90px;}
  .score-box .lbl{font-size:.6rem;letter-spacing:.18em;color:#9060c0;text-transform:uppercase;}
  .score-box .val{font-family:'Orbitron',sans-serif;font-size:1.3rem;font-weight:900;color:#ffd700;}
  #board{position:relative;background:rgba(20,10,40,.7);border:1.5px solid rgba(180,90,255,.3);
    border-radius:14px;padding:var(--gap);box-shadow:0 0 50px rgba(157,0,255,.25),0 20px 50px rgba(0,0,0,.6);
    --gap:12px;--cell:clamp(58px,18vw,92px);}
  .grid-bg,.tiles{display:grid;grid-template-columns:repeat(4,var(--cell));
    grid-template-rows:repeat(4,var(--cell));gap:var(--gap);}
  .tiles{position:absolute;inset:var(--gap);}
  .cell-bg{background:rgba(255,255,255,.04);border-radius:10px;}
  .tile{border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(1.3rem,5vw,2rem);
    animation:pop .16s ease;}
  @keyframes pop{from{transform:scale(.5);}to{transform:scale(1);}}
  @keyframes newpop{0%{transform:scale(0);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
  .tile.new{animation:newpop .2s ease;}
  .hint{font-size:.78rem;color:#7a5a9a;letter-spacing:.04em;}
  .btn{font-family:'Orbitron',sans-serif;font-weight:900;letter-spacing:.06em;cursor:pointer;
    border:none;border-radius:11px;padding:11px 30px;font-size:.82rem;color:#1a0a2e;
    background:linear-gradient(135deg,#ff66cc,#aa3399);box-shadow:0 0 18px rgba(255,80,190,.35);transition:.15s;}
  .btn:hover{transform:translateY(-2px);box-shadow:0 0 28px rgba(255,80,190,.6);}
  #overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;
    gap:16px;background:rgba(10,5,20,.88);border-radius:14px;backdrop-filter:blur(4px);z-index:5;}
  #overlay.show{display:flex;}
  #overlay .msg{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;
    color:#ffd700;text-shadow:0 0 24px rgba(255,200,0,.6);}
</style>
</head>
<body>
  <a href="index.html" class="back">← HUB</a>
  <div class="head">
    <div class="title">2048</div>
    <div class="scores">
      <div class="score-box"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
      <div class="score-box"><div class="lbl">Best</div><div class="val" id="best">0</div></div>
    </div>
  </div>
  <div id="board">
    <div class="grid-bg" id="gridbg"></div>
    <div class="tiles" id="tiles"></div>
    <div id="overlay"><div class="msg" id="ovmsg"></div><button class="btn" onclick="newGame()">▶ NEW GAME</button></div>
  </div>
  <div class="hint">↑ ↓ ← → &nbsp;or&nbsp; swipe &nbsp;·&nbsp; merge tiles to reach 2048</div>
  <button class="btn" onclick="newGame()">↻ NEW GAME</button>

<script>
'use strict';
const N=4, BEST_KEY='hub_2048_best';
const COLORS={2:'#3a2a55',4:'#4a2a70',8:'#ff8844',16:'#ff6622',32:'#ff4466',64:'#ff2255',
  128:'#44ccaa',256:'#22bbcc',512:'#4488ff',1024:'#aa66ff',2048:'#ffd700',4096:'#ff66cc'};
const TXT={2:'#c0a8e0',4:'#e0c0ff'};
let grid, score, best=+(localStorage.getItem(BEST_KEY)||0), won, over;

const tilesEl=document.getElementById('tiles');
const gridbg=document.getElementById('gridbg');
for(let i=0;i<N*N;i++){const c=document.createElement('div');c.className='cell-bg';gridbg.appendChild(c);}
document.getElementById('best').textContent=best;

function newGame(){
  grid=Array.from({length:N},()=>Array(N).fill(0));
  score=0;won=false;over=false;
  document.getElementById('overlay').classList.remove('show');
  addTile();addTile();render();
}
function addTile(){
  const empty=[];
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)if(!grid[r][c])empty.push([r,c]);
  if(!empty.length)return;
  const [r,c]=empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]=Math.random()<0.9?2:4;
  grid[r][c]={v:grid[r][c],isNew:true};
}
function val(x){return typeof x==='object'?x.v:x;}
function render(){
  tilesEl.innerHTML='';
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    const cell=grid[r][c]; if(!cell)continue;
    const v=val(cell);
    const t=document.createElement('div');
    t.className='tile'+(typeof cell==='object'&&cell.isNew?' new':'');
    t.textContent=v;
    t.style.background=COLORS[v]||'#ff66cc';
    t.style.color=TXT[v]||'#fff';
    t.style.boxShadow=v>=128?`0 0 18px ${COLORS[v]||'#fff'}88`:'none';
    if(v>=1024)t.style.fontSize='clamp(1rem,3.6vw,1.5rem)';
    tilesEl.appendChild(t);
    if(typeof cell==='object')grid[r][c]=cell.v; // clear isNew flag after render
  }
  document.getElementById('score').textContent=score;
  if(score>best){best=score;localStorage.setItem(BEST_KEY,best);}
  document.getElementById('best').textContent=best;
}
function slide(row){
  let a=row.filter(x=>x);
  for(let i=0;i<a.length-1;i++){
    if(a[i]===a[i+1]){a[i]*=2;score+=a[i];if(a[i]===2048&&!won){won=true;showOver('🎉 YOU WIN!');}a.splice(i+1,1);}
  }
  while(a.length<N)a.push(0);
  return a;
}
function rotate(g){ // clockwise
  const n=Array.from({length:N},()=>Array(N).fill(0));
  for(let r=0;r<N;r++)for(let c=0;c<N;c++)n[c][N-1-r]=g[r][c];
  return n;
}
function move(dir){ // 0=left 1=up 2=right 3=down
  if(over)return;
  let g=grid.map(row=>row.map(val));
  const prev=JSON.stringify(g);
  for(let i=0;i<dir;i++)g=rotate(g);
  g=g.map(slide);
  for(let i=0;i<(4-dir)%4;i++)g=rotate(g);
  const changed=JSON.stringify(g)!==prev;
  grid=g;
  if(changed){addTile();render();if(isOver())showOver('GAME OVER');}
  else render();
}
function isOver(){
  for(let r=0;r<N;r++)for(let c=0;c<N;c++){
    if(!grid[r][c])return false;
    const v=val(grid[r][c]);
    if(c<N-1&&v===val(grid[r][c+1]))return false;
    if(r<N-1&&v===val(grid[r+1][c]))return false;
  }
  return true;
}
function showOver(msg){over=msg.includes('OVER');document.getElementById('ovmsg').textContent=msg;
  document.getElementById('overlay').classList.add('show');}

document.addEventListener('keydown',e=>{
  const k={'ArrowLeft':0,'ArrowUp':1,'ArrowRight':2,'ArrowDown':3,a:0,w:1,d:2,s:3}[e.key];
  if(k!==undefined){e.preventDefault();move(k);}
});
// touch swipe
let tx,ty;
const board=document.getElementById('board');
board.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
board.addEventListener('touchend',e=>{
  if(tx==null)return;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<24&&Math.abs(dy)<24)return;
  if(Math.abs(dx)>Math.abs(dy))move(dx>0?2:0);else move(dy>0?3:1);
  tx=ty=null;
},{passive:true});

newGame();
</script>
</body>
</html>
